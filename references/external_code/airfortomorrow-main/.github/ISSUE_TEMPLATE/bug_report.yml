name: "🐛 Bug Report"
description: Help us improve air quality estimation for every child
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping us improve this air quality prediction system that supports UNICEF's mission to protect children's health. Please provide the details below to help us resolve the issue quickly.

  - type: input
    id: summary
    attributes:
      label: "Summary ⭐"
      placeholder: "Brief description of the issue (e.g., 'Pipeline fails during PM2.5 prediction step')"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce ⭐"
      description: "Provide clear steps to reproduce the issue"
      placeholder: |
        1. Run command: `python src/predict_air_quality.py --config config/config.yaml`
        2. Observe error during model loading
        3. Check logs for stack trace
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior ⭐"
      placeholder: "What should have happened?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior ⭐"
      description: "Include full error messages and relevant log output"
      render: shell
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: "Environment ⭐"
      description: "OS, Python version, and commit hash"
      placeholder: "macOS 14.5, Python 3.11.4, commit a1b2c3d"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: "Pre-submission Checklist"
      options:
        - label: "I have searched existing issues for similar problems"
          required: true
        - label: "I am using the latest version from the main branch"
          required: false
        - label: "I have included all relevant error messages and logs"
          required: true